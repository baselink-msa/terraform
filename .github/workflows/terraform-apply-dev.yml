name: Terraform Apply Dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform-apply-dev.yml"
      - "env/dev/**"
      - "modules/**"
      - "scripts/post-apply-dev.sh"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev-apply
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: "true"
  TF_VAR_cloudfront_origin_verify_header_value: ${{ secrets.CF_ORIGIN_VERIFY_HEADER_VALUE }}

jobs:
  apply:
    name: Apply dev infrastructure
    runs-on: [self-hosted, baselink-dev, iac]
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore tfvars
        env:
          DEV_INFRA_TFVARS: ${{ secrets.DEV_INFRA_TFVARS }}
          DEV_ECR_TFVARS: ${{ secrets.DEV_ECR_TFVARS }}
          DEV_ADDON_TFVARS: ${{ secrets.DEV_ADDON_TFVARS }}
          DEV_CLOUDFRONT_TFVARS: ${{ secrets.DEV_CLOUDFRONT_TFVARS }}
        run: |
          printf '%s' "$DEV_INFRA_TFVARS" > env/dev/infra/terraform.tfvars
          printf '%s' "$DEV_ECR_TFVARS" > env/dev/ecr/terraform.tfvars
          printf '%s' "$DEV_ADDON_TFVARS" > env/dev/addon/terraform.tfvars
          printf '%s' "$DEV_CLOUDFRONT_TFVARS" > env/dev/cloudfront/terraform.tfvars

      - name: Terraform apply infra
        working-directory: env/dev/infra
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform apply ecr
        working-directory: env/dev/ecr
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Terraform apply addon
        working-directory: env/dev/addon
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Run post apply tasks
        env:
          CF_ORIGIN_VERIFY_HEADER_NAME: ${{ secrets.CF_ORIGIN_VERIFY_HEADER_NAME }}
          CF_ORIGIN_VERIFY_HEADER_VALUE: ${{ secrets.CF_ORIGIN_VERIFY_HEADER_VALUE }}
        run: ./scripts/post-apply-dev.sh
